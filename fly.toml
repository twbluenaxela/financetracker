app = "financetrackertw"
primary_region = "nrt"

[build]

[deploy]
  release_command = "node_modules/.bin/prisma db push"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    path = "/login"
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
