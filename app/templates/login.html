{% extends "base.html" %}
{% block title %}登入 · 家庭理財{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 32 32" width="22" height="22">
          <path d="M6 22 L13 12 L18 18 L26 8" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="26" cy="8" r="2.5" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1>家庭理財</h1>
        <div class="brand-sub">Shared Ledger</div>
      </div>
    </div>
    <p class="muted">請登入以繼續。</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
      <label class="field">
        <span>帳號</span>
        <input type="email" name="email" autocomplete="username" required autofocus />
      </label>
      <label class="field">
        <span>密碼</span>
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <button type="submit" style="width:100%; margin-top:6px;">登入</button>
    </form>
  </div>
</div>
{% endblock %}
